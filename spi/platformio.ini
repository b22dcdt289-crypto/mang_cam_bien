#include <SPI.h>
#include <Adafruit_BMP280.h>

#define BMP_SCK  18
#define BMP_MISO 19
#define BMP_MOSI 23
#define BMP_CS   5

Adafruit_BMP280 bmp(BMP_CS, BMP_MOSI, BMP_MISO,  BMP_SCK);

void setup() {
  Serial.begin(115200);
  if (!bmp.begin()) {
    while (1);
  }
}

void loop() {
  Serial.println(bmp.readTemperature());
  delay(1000);
}
